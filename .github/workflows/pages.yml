name: GitHub Pages 배포

# main에 올라오면 테스트·빌드 통과 후 dist(게임 + trilogy.html 허브)를 배포한다.
# PR에서도 테스트·빌드를 돌려 깨진 코드가 main에 머지되는 것을 막는다.
# (저장소 Settings → Pages → Source를 "GitHub Actions"로 한 번 설정해 두어야 한다.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: 의존성 설치
        run: npm ci
      - name: 단위 테스트
        run: npm test
      - name: 빌드
        run: npm run build
      - name: 스모크 테스트
        run: npm run smoke
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
